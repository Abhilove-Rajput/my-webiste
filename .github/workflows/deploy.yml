name: Auto Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/key.pem << 'KEY'
          ${{ secrets.EC2_KEY }}
          KEY
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan -H 13.201.11.244 >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -F /dev/null -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -i ~/.ssh/key.pem ubuntu@13.201.11.244 "whoami"
